services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-real_business_suite}
      POSTGRES_USER: ${POSTGRES_USER:-rbs}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rbs} -d ${POSTGRES_DB:-real_business_suite}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
